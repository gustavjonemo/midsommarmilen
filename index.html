<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Midsommarmilen</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="game-container">
    <canvas id="gameCanvas" width="800" height="300"></canvas>
    <div id="overlay" class="overlay">
      <div id="overlay-content">
        <h1>Midsommarmilen 🌸</h1>
        <p id="overlay-msg">Ange ditt namn för att börja spela!</p>
        <input type="text" id="name-input" placeholder="Ditt namn" maxlength="20" autocomplete="off">
        <button id="action-btn">Spela!</button>
      </div>
    </div>
  </div>
  <script src="game.js"></script>
</body>
</html>
